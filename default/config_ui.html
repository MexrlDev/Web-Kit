  }
  function handleButtonPress(){
    if (currentButton < configOptions.length){
      var option = configOptions[currentButton];
      var key = option.key;
      if (option.type === 'cycle'){
        if (key === 'jb_behavior'){
          currentConfig.jb_behavior = (currentConfig.jb_behavior + 1) % jbBehaviorLabels.length;
        } else if (key === 'theme'){
          var themeIndex = availableThemes.indexOf(currentConfig.theme);
          var displayIndex = themeIndex >= 0 ? themeIndex : 0;
          var nextIndex = (displayIndex + 1) % availableThemes.length;
          currentConfig.theme = availableThemes[nextIndex];
        }
      } else {
        var boolKey = key;
        currentConfig[boolKey] = !currentConfig[boolKey];
        if (boolKey === 'music'){
          if (typeof CONFIG !== 'undefined') CONFIG.music = currentConfig.music;
          if (currentConfig.music) { if (typeof startBgmIfEnabled === 'function') startBgmIfEnabled(); } else { if (typeof stopBgm === 'function') stopBgm(); }
        }
        if (key === 'autolapse' && currentConfig.autolapse === true){
          currentConfig.autopoop = false;
          for (var _i4=0;_i4<configOptions.length;_i4++) if (configOptions[_i4].key === 'autopoop') { updateValueText(_i4); break; }
        } else if (key === 'autopoop' && currentConfig.autopoop === true){
          currentConfig.autolapse = false;
          for (var _i5=0;_i5<configOptions.length;_i5++) if (configOptions[_i5].key === 'autolapse') { updateValueText(_i5); break; }
        }
      }
      updateValueText(currentButton);
      saveConfig();
    }
  }
  var confirmKey = jsmaf.circleIsAdvanceButton ? 13 : 14;
  var backKey = jsmaf.circleIsAdvanceButton ? 14 : 13;
  jsmaf.onKeyDown = function(keyCode){
    if (keyCode === 6 || keyCode === 5){ currentButton = (currentButton + 1) % buttons.length; updateHighlight(); }
    else if (keyCode === 4 || keyCode === 7){ currentButton = (currentButton - 1 + buttons.length) % buttons.length; updateHighlight(); }
    else if (keyCode === confirmKey) handleButtonPress();
    else if (keyCode === backKey){
      saveConfig();
      try { window.location.href = 'main.html'; } catch(e){ include('main.html').catch(function(){}); }
    }
  };
  updateHighlight();
  loadConfig();
  log(lang.configLoaded || 'Config loaded');
})();
})();
